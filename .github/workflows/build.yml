name: Build macOS App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm install

    - name: Compile C++ Backend
      run: |
        cd backend
        mkdir -p build
        cd build
        cmake ..
        make

    - name: Build DMG
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm run dist

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InferenceOS-Beta-V0.1.dmg
        path: dist/*.dmg
